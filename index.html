<body class="text-gray-100 flex items-center justify-center p-3 md:p-4">

    <!-- Nút Xuất File -->
    

    <!-- MAIN APP CONTAINER -->
    <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-5 md:p-8 flex flex-col border border-slate-700 relative max-h-[96dvh] overflow-hidden">
        
        <!-- 1. HEADER -->
        <header class="flex-none flex justify-between items-center border-b border-slate-700 pb-4 mb-4 md:mb-6">
            <button id="review-wrong-words-btn" class="bg-red-600/20 text-red-300 px-3 py-2 rounded-lg transition-transform active:scale-95 font-bold text-xs md:text-sm">
                Từ sai: <span id="wrong-count">0</span>
            </button>
            <div class="text-center flex-1 px-2">
                <h1 class="text-lg md:text-2xl font-black text-blue-400 uppercase tracking-tight leading-none">Unit 12</h1>
                <p class="text-[9px] md:text-[10px] text-gray-500 font-bold tracking-widest mt-1">ROBOTS</p>
            </div>
             <div class="flex flex-col items-end">
                <p class="text-green-400 font-bold text-xs md:text-sm">Đúng: <span id="correct-count">0</span></p>
                <p id="progress-text" class="text-[10px] md:text-xs text-gray-500 mt-1 font-medium">Từ: 1 / 34</p>
            </div>
        </header>

        <!-- 2. QUESTION AREA -->
        <div class="flex-none bg-slate-700 rounded-xl p-5 md:p-8 text-center border-b-4 border-blue-500/30 flex items-center justify-center min-h-[90px] max-h-[130px] overflow-y-auto custom-scrollbar mb-4 md:mb-6">
            <p class="text-3xl md:text-5xl font-black text-white leading-tight break-words w-full" id="vietnamese-word">khả năng</p>
        </div>

        <!-- 3. INTERACTION AREA -->
        <form id="answer-form" class="flex-1 w-full flex flex-col justify-end" autocomplete="off">
            
            <!-- Input -->
            <input type="text" id="answer-input" autocomplete="off" spellcheck="false" autocapitalize="none" autocorrect="off" placeholder="Enter English word..." class="w-full flex-none bg-slate-900 border-2 border-slate-600 focus:border-blue-500 focus:ring-0 rounded-xl p-4 md:p-5 text-xl md:text-3xl text-center outline-none transition-colors font-bold text-white shadow-inner mb-3 md:mb-4">
            
            <!-- Result Area -->
            <div id="result-area" class="flex-none h-20 md:h-24 flex flex-col items-center justify-center invisible-result transition-opacity duration-200 mb-3 md:mb-4">
                <h2 id="result-message" class="text-xl md:text-2xl font-black mb-1">CHÍNH XÁC!</h2>
                <div id="correct-answer-details" class="text-center flex items-center gap-3">
                    <p id="correct-answer-text" class="text-base md:text-lg text-gray-300">
                        <span class="text-white font-bold text-xl md:text-2xl" id="ans-eng">buy</span>
                        <span class="text-gray-400 text-xs md:text-sm ml-2" id="ans-pho">/baɪ/ v</span>

                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>

            <!-- Nút bấm submit duy nhất -->
            <div class="h-14 md:h-16 w-full flex-none">
                <button type="submit" id="main-action-btn" class="w-full h-full bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl text-lg md:text-xl shadow-lg uppercase tracking-widest flex items-center justify-center transition-all active:scale-95 touch-manipulation">Check</button>
            </div>
        </form>
    </div>

                mistakeModal: document.getElementById('review-modal'),
                mistakeList: document.getElementById('wrong-words-list'),
                exportBtn: document.getElementById('export-btn'),
                form: document.getElementById('answer-form')
            };

            // --- TRẠNG THÁI ---
            let allWords = [], wrongWords = [], correctNum = 0, currentIdx = 0;
            let isReview = false, reviewIdx = 0, mainFlowIdx = 0;
            let isWordChecked = false; 
            let justMastered = false; // Đánh dấu khi 1 từ đã thuộc để không nhảy cóc
            const synth = window.speechSynthesis;

            function parseCSV(csv) {
                const lines = csv.trim().split('\n');
                return lines.map(line => {
                    const parts = [];
                    let current = '', inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { parts.push(current); current = ''; } 
                        else current += char;
                    }
                    parts.push(current);
                    if (isNaN(parseInt(parts[0], 10))) return null;
                    return {
                        id: parseInt(parts[0], 10),
                        viet: parts[1].trim().replace(/"/g, ''),
                        eng: parts[2].trim(),
                        phonetic: parts[3] ? parts[3].trim() : '',
                        type: parts[4] ? parts[4].trim().replace(/"/g, '') : '',
                        correctStreak: 0 // Biến đếm số lần đúng liên tiếp (Cần 3 lần)
                    };
                }).filter(word => word !== null);
            }

            // GIAO DIỆN CÂU HỎI MỚI
            function display() {
                isWordChecked = false;
                el.input.value = '';
                
                // Trả Nút về trạng thái CHECK
                el.mainBtn.textContent = 'Check';
                el.mainBtn.className = 'w-full h-full bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl text-lg md:text-xl shadow-lg uppercase tracking-widest flex items-center justify-center transition-all active:scale-95 touch-manipulation';
                
                // Trả Result Area về trạng thái Tàng hình
                el.resBox.classList.remove('visible-result');
                el.resBox.classList.add('invisible-result');

                const word = isReview ? wrongWords[reviewIdx] : allWords[currentIdx];
                el.viet.textContent = word.viet;
                
                // Update Progress (Review thì hiện số từ sai còn lại)
                el.progress.textContent = isReview ? `Ôn tập: Còn ${wrongWords.length} từ` : `Từ: ${currentIdx + 1} / ${allWords.length}`;
                
                if (!el.mistakeModal.classList.contains('hidden')) return;
                el.input.focus();
            }

            // XỬ LÝ KIỂM TRA TỪ
            function checkAnswer() {
                const ans = el.input.value.trim().toLowerCase();
                if(ans === '') {
                    el.input.focus();
                    return; 
                }

                isWordChecked = true;
                justMastered = false;

                const word = isReview ? wrongWords[reviewIdx] : allWords[currentIdx];
                const corrects = word.eng.toLowerCase().split('/').map(ans => ans.trim());

                // Đổi Nút sang trạng thái NEXT
                el.mainBtn.textContent = 'Next (Enter)';
                el.mainBtn.className = 'w-full h-full bg-slate-600 hover:bg-slate-500 text-white font-black rounded-xl text-lg md:text-xl shadow-lg uppercase tracking-widest flex items-center justify-center transition-all active:scale-95 touch-manipulation';

                // Hiện Result Area
                el.resBox.classList.remove('invisible-result');
                el.resBox.classList.add('visible-result');

                if (corrects.includes(ans)) {
                    // TRẢ LỜI ĐÚNG
                    if (isReview) {
                        word.correctStreak = (word.correctStreak || 0) + 1;
                        if (word.correctStreak >= 3) {
                            // Đã thuộc bài (Đúng 3 lần)
                            el.resMsg.textContent = 'ĐÃ THUỘC TỪ NÀY!';
                            el.resMsg.className = 'text-xl md:text-2xl font-black mb-1 text-emerald-400';
                            correctNum++;
                            wrongWords.splice(reviewIdx, 1); // Loại bỏ khỏi mảng từ sai
                            justMastered = true;
                            word.correctStreak = 0; // Reset
                        } else {
                            // Đúng 1, 2 lần
                            el.resMsg.textContent = `CHÍNH XÁC! (${word.correctStreak}/3)`;
                            el.resMsg.className = 'text-xl md:text-2xl font-black mb-1 text-green-400';
                        }
                    } else {
                        // Luồng chính
                        el.resMsg.textContent = 'CHÍNH XÁC!';
                        el.resMsg.className = 'text-xl md:text-2xl font-black mb-1 text-green-400';
                        correctNum++;
                    }
                    speak(word.eng.split('/')[0]);
                } else {
                    // TRẢ LỜI SAI
                    if (isReview) {
                        word.correctStreak = 0; // Trả lời sai bị tuột về 0
                        el.resMsg.textContent = 'SAI RỒI! (Về 0/3)';
                        el.resMsg.className = 'text-xl md:text-2xl font-black mb-1 text-red-400';
                    } else {
                        // Luồng chính
                        el.resMsg.textContent = 'SAI RỒI!';
                        el.resMsg.className = 'text-xl md:text-2xl font-black mb-1 text-red-400';
                        if (!wrongWords.some(w => w.id === word.id)) {
                            word.correctStreak = 0;
                            wrongWords.push(word);
                        }
                    }
                }
                
                el.ansEng.textContent = word.eng;
                el.ansPho.textContent = `${word.phonetic} ${word.type}`;
                el.wCount.textContent = wrongWords.length;
                el.cCount.textContent = correctNum;
                
                el.input.focus();
                el.input.setSelectionRange(0, el.input.value.length);
            }

            // CHUYỂN SANG TỪ TIẾP THEO
            function nextWord() {
                if (isReview) {
                    // Nếu đã học xong toàn bộ từ sai
                    if (wrongWords.length === 0) {
                        isReview = false;
                        alert('Tuyệt vời! Bạn đã hoàn thành ôn tập tất cả các từ sai!');
                        
                        // Kiểm tra xem luồng chính đã làm hết 34 câu chưa
                        if (currentIdx >= allWords.length) {
                            el.viet.textContent = "HOÀN THÀNH TẤT CẢ!";
                            el.progress.textContent = `Hết ${allWords.length} từ.`;
                            el.input.value = "";
                            el.input.blur(); 
                            el.mainBtn.style.display = 'none'; 
                            el.resBox.classList.remove('visible-result');
                            el.resBox.classList.add('invisible-result');
                        } else {
                            currentIdx = mainFlowIdx; // Trở lại nơi đang làm dở
                            display();
                        }
                        return;
                    }

                    // Nếu từ vừa rồi chưa thuộc (justMastered = false), ta chuyển sang từ tiếp theo
                    if (!justMastered) {
                        reviewIdx++;
                    }
                    
                    // Nếu đã đi hết 1 vòng mảng từ sai -> quay lại từ đầu mảng
                    if (reviewIdx >= wrongWords.length) {
                        reviewIdx = 0;
                    }
                    display();
                } else {
                    currentIdx++;
                    if (currentIdx >= allWords.length) {
                        el.viet.textContent = "HOÀN THÀNH LƯỢT ĐẦU!";
                        el.progress.textContent = `Hết ${allWords.length} từ.`;
                        el.input.value = "";
                        el.input.blur(); 
                        el.mainBtn.style.display = 'none'; 
                        el.resBox.classList.remove('visible-result');
                        el.resBox.classList.add('invisible-result');
                    } else {
                        display();
                    }
                }
            }

            function speak(text) {
                if (synth.speaking) synth.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.9;
                synth.speak(u);
            }

            // --- LÕI SỰ KIỆN DUY NHẤT VÀ CHUẨN MỰC ---
            el.form.addEventListener('submit', (e) => {
                e.preventDefault(); 
                if (!el.mistakeModal.classList.contains('hidden')) return;
                
                if (!isWordChecked) checkAnswer();
                else nextWord();
            });

            el.speak.addEventListener('click', (e) => {
                e.preventDefault();
                speak((isReview ? wrongWords[reviewIdx] : allWords[currentIdx]).eng.split('/')[0]);
                el.input.focus();
            });

            // --- XỬ LÝ MODAL TỪ SAI ---
            document.getElementById('review-wrong-words-btn').addEventListener('click', () => {
                el.mistakeList.innerHTML = '';
                if (wrongWords.length === 0) {
                    el.mistakeList.innerHTML = '<p class="text-center py-10 opacity-30 text-lg font-bold">KHÔNG CÓ TỪ SAI!</p>';
                    document.getElementById('start-review-btn').disabled = true;
                } else {
                    document.getElementById('start-review-btn').disabled = false;
                    wrongWords.sort((a,b) => a.id - b.id).forEach(w => {
                        const streak = w.correctStreak || 0;
                        const d = document.createElement('div');
                        d.className = 'bg-slate-700 p-3 rounded-xl border-l-4 border-red-500 flex justify-between items-center';
                        // Hiển thị thêm (0/3) ở danh sách ôn tập
                        d.innerHTML = `<div><p class="font-bold text-white text-base">${w.eng} <span class="text-blue-400 text-sm font-medium ml-1">(${streak}/3)</span></p><p class="text-xs text-gray-400 uppercase mt-1">${w.viet}</p></div>`;
                        el.mistakeList.appendChild(d);
                    });
                }
                el.mistakeModal.classList.remove('hidden');
                el.input.blur(); 
            });

            document.getElementById('close-modal-btn').addEventListener('click', () => { 
                el.mistakeModal.classList.add('hidden'); 
                el.input.focus(); 
            });
            
            document.getElementById('start-review-btn').addEventListener('click', () => {
                isReview = true; 
                mainFlowIdx = currentIdx; 
                reviewIdx = 0; 
                el.mistakeModal.classList.add('hidden'); 
                display();
            });

            // --- XUẤT FILE ---
            if (el.exportBtn) {
                el.exportBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const clone = document.documentElement.cloneNode(true);
                    const wrap = clone.querySelector('#export-wrapper');
                    if (wrap) wrap.remove();
                    const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'Unit12_Mastery.html';
                    a.click();
                });
            }

            allWords = parseCSV(csvData);
            display();
        });
    </script>

</body></html>
